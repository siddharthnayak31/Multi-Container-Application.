<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App — Multi-Container Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0a0f;
      --bg-secondary: #12121a;
      --bg-card: #1a1a28;
      --bg-input: #14141f;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(139, 92, 246, 0.5);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #8b5cf6;
      --accent-hover: #a78bfa;
      --accent-glow: rgba(139, 92, 246, 0.15);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.1);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.1);
      --warning: #f59e0b;
      --gradient-1: linear-gradient(135deg, #8b5cf6, #6366f1);
      --gradient-2: linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 48px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 40px rgba(139, 92, 246, 0.1);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background effects */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(ellipse at 30% 20%, rgba(139, 92, 246, 0.05) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.03) 0%, transparent 50%);
      z-index: 0;
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      background: var(--accent-glow);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 500;
      color: var(--accent-hover);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .header-badge .dot {
      width: 6px;
      height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .header h1 {
      font-size: 36px;
      font-weight: 700;
      background: var(--gradient-2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 400;
    }

    /* Stats Bar */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      text-align: center;
      transition: var(--transition);
    }

    .stat-card:hover {
      border-color: rgba(139, 92, 246, 0.15);
      transform: translateY(-1px);
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .stat-card.accent .stat-value { color: var(--accent); }
    .stat-card.success .stat-value { color: var(--success); }
    .stat-card.warning .stat-value { color: var(--warning); }

    /* Add Todo Form */
    .add-form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
    }

    .add-form:focus-within {
      border-color: var(--border-focus);
      box-shadow: var(--shadow-glow);
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }

    .form-row:last-child {
      margin-bottom: 0;
    }

    .input-group {
      flex: 1;
      position: relative;
    }

    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 14px;
      transition: var(--transition);
      outline: none;
      resize: none;
    }

    .input-group input::placeholder,
    .input-group textarea::placeholder {
      color: var(--text-muted);
    }

    .input-group input:focus,
    .input-group textarea:focus {
      border-color: var(--border-focus);
      background: rgba(139, 92, 246, 0.03);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--gradient-1);
      color: white;
      box-shadow: 0 2px 12px rgba(139, 92, 246, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Filter Tabs */
    .filters {
      display: flex;
      gap: 4px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 4px;
      margin-bottom: 20px;
    }

    .filter-btn {
      flex: 1;
      padding: 8px 16px;
      background: transparent;
      border: none;
      border-radius: 6px;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .filter-btn:hover {
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.03);
    }

    .filter-btn.active {
      background: var(--bg-card);
      color: var(--text-primary);
      box-shadow: var(--shadow-sm);
    }

    /* Todo List */
    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 16px 18px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      transition: var(--transition);
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .todo-item:hover {
      border-color: rgba(255, 255, 255, 0.1);
      background: rgba(26, 26, 40, 0.8);
    }

    .todo-item.completed {
      opacity: 0.55;
    }

    .todo-item.completed .todo-title {
      text-decoration: line-through;
      color: var(--text-secondary);
    }

    /* Custom Checkbox */
    .todo-checkbox {
      position: relative;
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .todo-checkbox input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
      z-index: 2;
    }

    .todo-checkbox .checkmark {
      position: absolute;
      top: 0;
      left: 0;
      width: 22px;
      height: 22px;
      border: 2px solid var(--text-muted);
      border-radius: 6px;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .todo-checkbox .checkmark svg {
      width: 12px;
      height: 12px;
      opacity: 0;
      transform: scale(0);
      transition: var(--transition);
    }

    .todo-checkbox input:checked + .checkmark {
      background: var(--gradient-1);
      border-color: var(--accent);
    }

    .todo-checkbox input:checked + .checkmark svg {
      opacity: 1;
      transform: scale(1);
    }

    .todo-checkbox input:hover + .checkmark {
      border-color: var(--accent);
    }

    .todo-content {
      flex: 1;
      min-width: 0;
    }

    .todo-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
      margin-bottom: 4px;
      line-height: 1.4;
    }

    .todo-description {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .todo-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-muted);
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .btn-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
    }

    .btn-icon.delete:hover {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .btn-icon svg {
      width: 16px;
      height: 16px;
    }

    /* Edit Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: var(--transition);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 90%;
      max-width: 480px;
      box-shadow: var(--shadow-lg);
      transform: scale(0.95) translateY(10px);
      transition: var(--transition);
    }

    .modal-overlay.active .modal {
      transform: scale(1) translateY(0);
    }

    .modal h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: var(--text-primary);
    }

    .modal .input-group {
      margin-bottom: 14px;
    }

    .modal .input-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .btn-ghost {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }

    .btn-ghost:hover {
      border-color: rgba(255, 255, 255, 0.15);
      color: var(--text-primary);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state h3 {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Toast */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 12px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn 0.3s ease-out;
      min-width: 240px;
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .toast.success { border-left: 3px solid var(--success); }
    .toast.error { border-left: 3px solid var(--danger); }

    /* Loading spinner */
    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 600px) {
      .app { padding: 24px 16px 60px; }
      .header h1 { font-size: 28px; }
      .stats { flex-direction: column; gap: 8px; }
      .form-row { flex-direction: column; }
      .todo-actions { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-badge">
        <span class="dot"></span>
        API Connected
      </div>
      <h1>Todo App</h1>
      <p>Multi-container application powered by Docker Compose</p>
    </div>

    <!-- Stats -->
    <div class="stats">
      <div class="stat-card accent">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-card warning">
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card success">
        <div class="stat-value" id="stat-completed">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <!-- Add Form -->
    <div class="add-form">
      <div class="form-row">
        <div class="input-group">
          <input type="text" id="todo-title" placeholder="What needs to be done?" maxlength="200" />
        </div>
        <button class="btn btn-primary" id="add-btn" onclick="addTodo()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add
        </button>
      </div>
      <div class="form-row">
        <div class="input-group">
          <input type="text" id="todo-desc" placeholder="Add a description (optional)" />
        </div>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" data-filter="pending" onclick="setFilter('pending')">Pending</button>
      <button class="filter-btn" data-filter="completed" onclick="setFilter('completed')">Completed</button>
    </div>

    <!-- Todo List -->
    <div class="todo-list" id="todo-list"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <h3>Edit Todo</h3>
      <div class="input-group">
        <label>Title</label>
        <input type="text" id="edit-title" maxlength="200" />
      </div>
      <div class="input-group">
        <label>Description</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script>
    const API = '';
    let todos = [];
    let currentFilter = 'all';
    let editingId = null;

    // --- API calls ---
    async function fetchTodos() {
      try {
        const res = await fetch(`${API}/todos`);
        todos = await res.json();
        renderTodos();
        updateStats();
      } catch (err) {
        showToast('Failed to load todos', 'error');
      }
    }

    async function addTodo() {
      const titleEl = document.getElementById('todo-title');
      const descEl = document.getElementById('todo-desc');
      const title = titleEl.value.trim();
      const description = descEl.value.trim();

      if (!title) {
        titleEl.focus();
        titleEl.style.borderColor = 'var(--danger)';
        setTimeout(() => titleEl.style.borderColor = '', 1500);
        return;
      }

      const btn = document.getElementById('add-btn');
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/todos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });
        const todo = await res.json();
        todos.unshift(todo);
        renderTodos();
        updateStats();
        titleEl.value = '';
        descEl.value = '';
        showToast('Todo created!', 'success');
      } catch (err) {
        showToast('Failed to create todo', 'error');
      } finally {
        btn.disabled = false;
        titleEl.focus();
      }
    }

    async function toggleTodo(id) {
      const todo = todos.find(t => t._id === id);
      if (!todo) return;

      try {
        const res = await fetch(`${API}/todos/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed: !todo.completed }),
        });
        const updated = await res.json();
        const idx = todos.findIndex(t => t._id === id);
        todos[idx] = updated;
        renderTodos();
        updateStats();
      } catch (err) {
        showToast('Failed to update todo', 'error');
      }
    }

    async function deleteTodo(id) {
      try {
        await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
        todos = todos.filter(t => t._id !== id);
        renderTodos();
        updateStats();
        showToast('Todo deleted', 'success');
      } catch (err) {
        showToast('Failed to delete todo', 'error');
      }
    }

    function openEdit(id) {
      const todo = todos.find(t => t._id === id);
      if (!todo) return;
      editingId = id;
      document.getElementById('edit-title').value = todo.title;
      document.getElementById('edit-desc').value = todo.description || '';
      document.getElementById('edit-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('edit-modal').classList.remove('active');
      editingId = null;
    }

    async function saveEdit() {
      if (!editingId) return;
      const title = document.getElementById('edit-title').value.trim();
      const description = document.getElementById('edit-desc').value.trim();

      if (!title) return;

      try {
        const res = await fetch(`${API}/todos/${editingId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description }),
        });
        const updated = await res.json();
        const idx = todos.findIndex(t => t._id === editingId);
        todos[idx] = updated;
        renderTodos();
        closeModal();
        showToast('Todo updated!', 'success');
      } catch (err) {
        showToast('Failed to update todo', 'error');
      }
    }

    // --- Rendering ---
    function renderTodos() {
      const list = document.getElementById('todo-list');
      let filtered = todos;

      if (currentFilter === 'pending') filtered = todos.filter(t => !t.completed);
      if (currentFilter === 'completed') filtered = todos.filter(t => t.completed);

      if (filtered.length === 0) {
        const messages = {
          all: { icon: '📝', title: 'No todos yet', desc: 'Add your first todo above to get started' },
          pending: { icon: '✅', title: 'All caught up!', desc: 'No pending todos — great job!' },
          completed: { icon: '🚀', title: 'Nothing completed yet', desc: 'Complete a todo to see it here' },
        };
        const msg = messages[currentFilter];
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">${msg.icon}</div>
            <h3>${msg.title}</h3>
            <p>${msg.desc}</p>
          </div>`;
        return;
      }

      list.innerHTML = filtered.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}">
          <label class="todo-checkbox">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo('${todo._id}')" />
            <span class="checkmark">
              <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
            </span>
          </label>
          <div class="todo-content">
            <div class="todo-title">${escapeHtml(todo.title)}</div>
            ${todo.description ? `<div class="todo-description">${escapeHtml(todo.description)}</div>` : ''}
            <div class="todo-meta">
              <span>${timeAgo(todo.createdAt)}</span>
            </div>
          </div>
          <div class="todo-actions">
            <button class="btn-icon" onclick="openEdit('${todo._id}')" title="Edit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
            <button class="btn-icon delete" onclick="deleteTodo('${todo._id}')" title="Delete">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const total = todos.length;
      const completed = todos.filter(t => t.completed).length;
      const pending = total - completed;
      animateNumber('stat-total', total);
      animateNumber('stat-pending', pending);
      animateNumber('stat-completed', completed);
    }

    function animateNumber(id, target) {
      const el = document.getElementById(id);
      const current = parseInt(el.textContent) || 0;
      if (current === target) return;
      el.textContent = target;
      el.style.transform = 'scale(1.2)';
      setTimeout(() => el.style.transform = 'scale(1)', 200);
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderTodos();
    }

    // --- Utilities ---
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function timeAgo(dateStr) {
      const seconds = Math.floor((new Date() - new Date(dateStr)) / 1000);
      if (seconds < 60) return 'just now';
      if (seconds < 3600) return `${Math.floor(seconds / 60)}m ago`;
      if (seconds < 86400) return `${Math.floor(seconds / 3600)}h ago`;
      return `${Math.floor(seconds / 86400)}d ago`;
    }

    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        ${type === 'success' ? '✓' : '✕'}
        <span>${message}</span>
      `;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(20px)';
        setTimeout(() => toast.remove(), 300);
      }, 2500);
    }

    // --- Event listeners ---
    document.getElementById('todo-title').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('todo-desc').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    document.getElementById('edit-modal').addEventListener('click', e => {
      if (e.target.id === 'edit-modal') closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    // --- Init ---
    fetchTodos();
  </script>
</body>
</html>
