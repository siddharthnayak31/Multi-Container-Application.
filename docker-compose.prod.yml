version: "3.8"

services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: todo-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: tododb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - todo-network

  # Node.js API (pulls from Docker Hub in production)
  api:
    image: ${DOCKER_USERNAME:-yourdockerhub}/todo-api:latest
    container_name: todo-api
    restart: unless-stopped
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongo:27017/tododb
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - todo-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:1.27-alpine
    container_name: todo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - todo-network

volumes:
  mongo-data:
    driver: local

networks:
  todo-network:
    driver: bridge
